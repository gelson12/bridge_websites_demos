<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        :root {
            --dark-bg: #1a1a2e;
            --dark-fg: #e0e0e0;
            --accent-color: #e94560;
            --button-hover: #c93550;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--dark-fg);
            font-family: var(--font-family);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }

        .container {
            background-color: #2e2e4a;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: var(--accent-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #timer-display {
            font-size: 6em;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--dark-fg);
            text-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
            margin: 0;
            user-select: none;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        #timer-display.break {
            color: #7aff7a; /* A pleasant green for break */
            text-shadow: 0 0 15px rgba(122, 255, 122, 0.5);
        }

        .controls button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 0 10px;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.1s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .controls button:hover {
            background-color: var(--button-hover);
            transform: translateY(-2px);
        }

        .controls button:active {
            transform: translateY(0);
        }

        .controls button:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.5);
        }

        .mode-toggle {
            display: flex;
            gap: 10px;
        }

        .mode-toggle button {
            background-color: rgba(255, 255, 255, 0.1);
            color: var(--dark-fg);
            padding: 8px 15px;
            font-size: 1em;
            border-radius: 5px;
            transition: background-color 0.3s ease;
            box-shadow: none;
            margin: 0;
        }

        .mode-toggle button:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: none;
        }

        .mode-toggle button.active {
            background-color: var(--accent-color);
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                gap: 20px;
            }
            h1 {
                font-size: 2em;
            }
            #timer-display {
                font-size: 4em;
            }
            .controls button {
                padding: 12px 20px;
                font-size: 1em;
                margin: 0 5px;
            }
            .mode-toggle button {
                padding: 6px 10px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pomodoro</h1>
        <div class="mode-toggle">
            <button id="work-mode-btn" class="active">Work</button>
            <button id="break-mode-btn">Break</button>
        </div>
        <div id="timer-display">25:00</div>
        <div class="controls">
            <button id="start-btn">Start</button>
            <button id="pause-btn" style="display: none;">Pause</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <audio id="chime" src="https://assets.mixkit.co/sfx/preview/mixkit-positive-notification-alert-1681.mp3" preload="auto"></audio>

    <script>
        const timerDisplay = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const workModeBtn = document.getElementById('work-mode-btn');
        const breakModeBtn = document.getElementById('break-mode-btn');
        const chime = document.getElementById('chime');

        let interval;
        let isRunning = false;
        let currentMode = 'work'; // 'work' or 'break'
        let timeRemaining = 0; // in seconds

        const DEFAULT_WORK_TIME = 25 * 60; // 25 minutes
        const DEFAULT_BREAK_TIME = 5 * 60; // 5 minutes

        // Load settings from localStorage or use defaults
        let workTime = parseInt(localStorage.getItem('pomodoroWorkTime')) || DEFAULT_WORK_TIME;
        let breakTime = parseInt(localStorage.getItem('pomodoroBreakTime')) || DEFAULT_BREAK_TIME;

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes < 10 ? '0' : ''}${minutes}:${remainingSeconds < 10 ? '0' : ''}${remainingSeconds}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            document.title = `${formatTime(timeRemaining)} - Pomodoro`;
        }

        function setMode(mode) {
            currentMode = mode;
            if (currentMode === 'work') {
                timeRemaining = workTime;
                workModeBtn.classList.add('active');
                breakModeBtn.classList.remove('active');
                timerDisplay.classList.remove('break');
            } else {
                timeRemaining = breakTime;
                breakModeBtn.classList.add('active');
                workModeBtn.classList.remove('active');
                timerDisplay.classList.add('break');
            }
            if (!isRunning) {
                updateDisplay();
            }
        }

        function startTimer() {
            if (isRunning) return;

            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';

            if (timeRemaining === 0) {
                setMode(currentMode); // Reset time if it was 0
            }

            interval = setInterval(() => {
                timeRemaining--;
                updateDisplay();

                if (timeRemaining <= 0) {
                    clearInterval(interval);
                    isRunning = false;
                    chime.play();
                    startBtn.style.display = 'inline-block';
                    pauseBtn.style.display = 'none';

                    // Auto switch mode after timer ends
                    if (currentMode === 'work') {
                        alert('Work session ended! Time for a break.');
                        setMode('break');
                        startTimer(); // Auto-start break
                    } else {
                        alert('Break session ended! Time to get back to work.');
                        setMode('work');
                        startTimer(); // Auto-start work
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;

            isRunning = false;
            clearInterval(interval);
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            pauseTimer();
            setMode(currentMode); // Reset to current mode's default time
            updateDisplay();
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        // Event Listeners
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        workModeBtn.addEventListener('click', () => setMode('work'));
        breakModeBtn.addEventListener('click', () => setMode('break'));

        // Keyboard Support (Space to toggle, R to reset)
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent scrolling
                toggleTimer();
            } else if (e.code === 'KeyR') {
                resetTimer();
            }
        });

        // Initial setup
        setMode(currentMode);
        updateDisplay();
    </script>
</body>
</html>
